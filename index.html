<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الساعة والتاريخ - تصميم هادئ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap');
        
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Noto Sans Arabic', system-ui, sans-serif;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        /* الجزء العلوي: اليوم */
        .day-section {
            margin-bottom: 25px;
        }
        
        .day-ar {
            font-size: 1.8rem;
            font-weight: 600;
            display: block;
        }
        
        .day-en {
            font-size: 0.9rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 4px;
            display: block;
        }

        /* الجزء الأوسط: الساعة */
        .time-section {
            margin-bottom: 25px;
        }

        .time {
            font-size: 4rem;
            font-weight: 400;
            font-family: 'JetBrains Mono', monospace;
            letter-spacing: -2px;
        }

        /* الجزء السفلي: التواريخ */
        .date-section {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .date-miladi {
            font-size: 1.4rem;
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-main);
        }
        
        .date-hijri {
            font-size: 1.2rem;
            color: var(--text-dim);
            font-weight: 300;
        }
        
        /* تذييل بسيط */
        .footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 1px;
        }

        /* استجابة الشاشات الصغيرة جداً */
        @media (max-width: 350px) {
            .time { font-size: 3rem; }
            .day-ar { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="day-section">
            <span class="day-ar" id="dayAr"></span>
            <span class="day-en" id="dayEn"></span>
        </div>
        
        <div class="time-section">
            <div class="time" id="time">00:00:00</div>
        </div>
        
        <div class="date-section">
            <div class="date-miladi" id="dateMiladi"></div>
            <div class="date-hijri" id="dateHijri"></div>
        </div>
    </div>
    
    <div class="footer">RIYADH, KSA</div>

    <script>
        const daysAr = ["الأحد", "الإثنين", "الثلاثاء", "الأربعاء", "الخميس", "الجمعة", "السبت"];
        const daysEn = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
        
        function pad(num) {
            return num < 10 ? '0' + num : num;
        }
        
        function updateClock() {
            const now = new Date();
            const options = { timeZone: 'Asia/Riyadh' };
            
            const dayIndex = now.getDay();
            document.getElementById('dayAr').textContent = daysAr[dayIndex];
            document.getElementById('dayEn').textContent = daysEn[dayIndex];
            
            const year = now.toLocaleString('en-US', { ...options, year: 'numeric' });
            let month = now.toLocaleString('en-US', { ...options, month: 'numeric' });
            let day = now.toLocaleString('en-US', { ...options, day: 'numeric' });
            
            document.getElementById('dateMiladi').textContent = `${year}/${month}/${day}`;
            
            try {
                const hijriFormatter = new Intl.DateTimeFormat('ar-SA-u-ca-islamic', {
                    timeZone: 'Asia/Riyadh',
                    year: 'numeric',
                    month: 'numeric',
                    day: 'numeric'
                });
                
                const hijriParts = hijriFormatter.formatToParts(now);
                let hDay = '', hMonth = '', hYear = '';
                
                hijriParts.forEach(part => {
                    if (part.type === 'day') hDay = part.value;
                    if (part.type === 'month') hMonth = part.value;
                    if (part.type === 'year') hYear = part.value;
                });
                
                document.getElementById('dateHijri').textContent = `${hDay} / ${hMonth} / ${hYear} هـ`;
            } catch(e) {
                document.getElementById('dateHijri').textContent = `---`;
            }
            
            const hours = pad(now.toLocaleString('en-US', { ...options, hour: 'numeric', hour12: false }));
            const minutes = pad(now.toLocaleString('en-US', { ...options, minute: 'numeric' }));
            const seconds = pad(now.toLocaleString('en-US', { ...options, second: 'numeric' }));
            
            document.getElementById('time').textContent = `${hours}:${minutes}:${seconds}`;
        }
        
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
